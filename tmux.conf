unbind c-b
set -g prefix c-t
bind c-t send-prefix

set -s extended-keys off
# set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -wg mode-keys vi
set -g allow-passthrough on
if-shell "uname | grep -q Darwin" {
    set -g default-command "which reattach-to-user-namespace > /dev/null && reattach-to-user-namespace -l $SHELL || $SHELL"
}
set -g repeat-time 0
set -g default-terminal "tmux-256color"
set -sa terminal-features ',xterm-256color:RGB'
set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -wg pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
set -g status-right-length 60
# Prefix 없이 세션 리스트 (Ctrl+,)
bind -n C-, choose-tree -sZ

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jaclu/tmux-mouse-swipe'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
# Minimal status bar
set -g status 2
set -g status-position bottom
set -g status-style "bg=default,fg=colour248"
set -g @session-tabs "#{S:#{?#{==:#{session_name},#{client_session}},#[fg=colour255#,bold] #{=/18/...:session_name} #[default],#[fg=colour240] #{=/18/...:session_name} #[default]}}"
set -g status-format[0] "#[align=left]#{T;=/#{status-left-length}:status-left}#[list=on align=#{status-justify}]#{W:#{E:window-status-format},#{E:window-status-current-format}}#[nolist align=right]#{T;=/#{status-right-length}:status-right}"
set -g status-format[1] "#[align=left]#{E:@session-tabs}"
set -g status-left " #[fg=colour208,bold]#S #[fg=colour240]│ "
set -g status-left-length 30
set -g status-right "#[fg=colour240]│ #[fg=colour208,bold]#H "
set -g window-status-format "#[fg=colour240] #I #W#{?window_zoomed_flag, [Z],} "
set -g window-status-current-format "#[fg=colour255,bold] #I #W#{?window_zoomed_flag, [Z],} "
set -g window-status-separator ""
set -g message-style "bg=default,fg=colour4"
set -g message-command-style "bg=default,fg=colour4"

bind r source-file ~/.tmux.conf \; display "Reloaded!"

# vim-like pane switching
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

# Resizing pane
bind -n C-S-Up resize-pane -U 5
bind -n C-S-Down resize-pane -D 5
bind -n C-S-Left resize-pane -L 5
bind -n C-S-Right resize-pane -R 5

# Move window
bind C-Left swap-window -t -1 \; previous-window
bind C-Right swap-window -t +1 \; next-window

# New Session
bind N command-prompt -p "Session Name:" "new-session -s '%%'"

# Kill Session and Select Session
bind X run "tmux switch-client -n && tmux kill-session -t '#S' && tmux choose-session"

